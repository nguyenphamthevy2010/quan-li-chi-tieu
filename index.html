<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Chi tiêu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="shortcut icon" href="https://i.imgur.com/tBsNVvE.jpeg" type="image/png" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        .custom-shadow {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }

        .modal-overlay {
            background-color: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            transition: opacity 0.3s ease;
        }

        .category-chip.active {
            background-color: #4f46e5;
            color: white;
            border-color: #4f46e5;
        }

        /* Ẩn scrollbar cho Chrome, Safari và Opera */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        input[type="date"]::-webkit-inner-spin-button,
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(0.5);
        }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen relative shadow-2xl bg-white">

    <!-- Header & Dashboard -->
    <div class="bg-indigo-600 text-white p-6 pb-12">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-xl font-bold">Tài khoản chính</h1>
                <p class="text-indigo-200 text-xs" id="current-date"></p>
            </div>
            <button onclick="toggleModal('budget-modal')" class="w-10 h-10 bg-white/10 rounded-full flex items-center justify-center hover:bg-white/20 transition-all">
                <i class="fa-solid fa-sliders"></i>
            </button>
        </div>

        <div class="mb-6">
            <p class="text-indigo-100 text-sm opacity-80 mb-1">Số dư còn lại</p>
            <h2 class="text-4xl font-extrabold tracking-tight" id="display-remaining">0 ₫</h2>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="bg-indigo-700/50 p-4 rounded-2xl border border-white/10">
                <p class="text-[10px] uppercase font-bold text-indigo-200 mb-1">Số tiền đầu</p>
                <p class="text-lg font-bold" id="display-initial">0 ₫</p>
            </div>
            <div class="bg-rose-500/20 p-4 rounded-2xl border border-white/10">
                <p class="text-[10px] uppercase font-bold text-rose-200 mb-1">Tổng đã chi</p>
                <p class="text-lg font-bold" id="display-spent">0 ₫</p>
            </div>
        </div>
    </div>

    <!-- Danh sách chi tiêu -->
    <div class="bg-white rounded-t-[2.5rem] -mt-6 p-6 min-h-[60vh]">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-lg font-bold text-gray-800">Lịch sử giao dịch</h3>
            <span class="text-xs font-semibold text-gray-400 bg-gray-100 px-3 py-1 rounded-full" id="count-tx">0 GD</span>
        </div>

        <div id="expense-list" class="space-y-6 pb-24">
            <!-- Items sẽ được render ở đây -->
        </div>
    </div>

    <!-- FAB Button -->
    <button onclick="openExpenseModal()" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-indigo-600 text-white px-8 py-4 rounded-full shadow-xl flex items-center gap-3 active:scale-95 transition-all font-bold z-40">
        <i class="fa-solid fa-plus text-xl"></i>
        <span>Thêm chi tiêu</span>
    </button>

    <!-- Modal Cài đặt Ngân sách -->
    <div id="budget-modal" class="hidden fixed inset-0 z-[60] flex items-center justify-center p-6 modal-overlay">
        <div class="bg-white w-full rounded-3xl p-6 shadow-2xl scale-in">
            <h3 class="text-xl font-bold mb-2">Số tiền ban đầu</h3>
            <p class="text-sm text-gray-500 mb-6">Nhập số tiền hiện có trong ví của bạn.</p>
            <input type="number" id="input-budget" class="w-full bg-gray-100 border-none rounded-2xl p-4 text-2xl font-bold mb-6 focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="0">
            <div class="flex gap-3">
                <button onclick="toggleModal('budget-modal')" class="flex-1 py-4 bg-gray-100 text-gray-600 rounded-2xl font-bold">Hủy</button>
                <button onclick="saveBudget()" class="flex-1 py-4 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg shadow-indigo-100">Cập nhật</button>
            </div>
        </div>
    </div>

    <!-- Modal Thêm Chi Tiêu -->
    <div id="expense-modal" class="hidden fixed inset-0 z-[50] flex flex-col justify-end modal-overlay">
        <div class="bg-white w-full rounded-t-[2.5rem] p-8 max-h-[90vh] overflow-y-auto no-scrollbar">
            <div class="flex justify-between items-center mb-8">
                <h3 class="text-2xl font-bold text-gray-800">Ghi chi tiêu</h3>
                <button onclick="toggleModal('expense-modal')" class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <div class="space-y-6">
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2 ml-1">Số tiền (VNĐ)</label>
                    <input type="number" id="input-amount" class="w-full bg-gray-50 border-b-2 border-gray-100 p-4 text-4xl font-black text-indigo-600 focus:border-indigo-500 outline-none transition-all" placeholder="0">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2 ml-1">Ngày chi</label>
                        <input type="date" id="input-date" class="w-full bg-gray-50 border-none rounded-xl p-3 text-sm font-semibold outline-none">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2 ml-1">Danh mục</label>
                        <button onclick="toggleModal('category-modal')" class="w-full bg-gray-50 text-left p-3 rounded-xl text-sm font-semibold flex justify-between items-center">
                            <span id="selected-category-text">Ăn uống</span>
                            <i class="fa-solid fa-chevron-right text-[10px] text-gray-400"></i>
                        </button>
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2 ml-1">Ghi chú</label>
                    <textarea id="input-note" class="w-full bg-gray-50 border-none rounded-2xl p-4 text-sm h-24 outline-none focus:ring-1 focus:ring-indigo-500" placeholder="Bạn đã mua gì thế?"></textarea>
                </div>

                <button onclick="saveExpense()" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-bold text-lg shadow-xl active:bg-indigo-700 mb-4 transition-all">Lưu giao dịch</button>
            </div>
        </div>
    </div>

    <!-- Modal Chọn Danh Mục -->
    <div id="category-modal" class="hidden fixed inset-0 z-[70] flex items-center justify-center p-6 modal-overlay">
        <div class="bg-white w-full rounded-3xl p-6 shadow-2xl max-h-[80vh] flex flex-col">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold">Phân loại chi tiêu</h3>
                <button onclick="toggleModal('category-modal')" class="text-gray-400"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            
            <div id="category-grid" class="grid grid-cols-2 gap-3 mb-6 overflow-y-auto no-scrollbar p-1">
                <!-- Danh mục sẽ được render ở đây -->
            </div>

            <div class="pt-4 border-t border-gray-100">
                <p class="text-[10px] font-bold text-gray-400 uppercase mb-3 tracking-widest">Thêm danh mục mới</p>
                <div class="flex gap-2">
                    <input type="text" id="input-new-cat" class="flex-1 bg-gray-100 border-none rounded-xl px-4 py-3 text-sm font-medium outline-none" placeholder="Tên danh mục...">
                    <button onclick="addNewCategory()" class="bg-indigo-600 text-white px-5 rounded-xl font-bold text-sm">Thêm</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // State Management
        let state = {
            initialBudget: parseFloat(localStorage.getItem('initialBudget')) || 0,
            expenses: JSON.parse(localStorage.getItem('expenses')) || [],
            categories: JSON.parse(localStorage.getItem('categories')) || ['Ăn uống', 'Di chuyển', 'Mua sắm', 'Giải trí', 'Học tập', 'Sức khỏe'],
            selectedCategory: 'Ăn uống'
        };

        // DOM Elements
        const el = {
            displayRemaining: document.getElementById('display-remaining'),
            displayInitial: document.getElementById('display-initial'),
            displaySpent: document.getElementById('display-spent'),
            expenseList: document.getElementById('expense-list'),
            countTx: document.getElementById('count-tx'),
            currentDate: document.getElementById('current-date')
        };

        // Initialize
        function init() {
            renderDashboard();
            renderExpenses();
            renderCategories();
            el.currentDate.innerText = new Date().toLocaleDateString('vi-VN', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
            document.getElementById('input-date').valueAsDate = new Date();
        }

        function formatMoney(amount) {
            return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(amount);
        }

        function toggleModal(id) {
            const modal = document.getElementById(id);
            modal.classList.toggle('hidden');
        }

        function renderDashboard() {
            const totalSpent = state.expenses.reduce((sum, item) => sum + item.amount, 0);
            const remaining = state.initialBudget - totalSpent;

            el.displayInitial.innerText = formatMoney(state.initialBudget);
            el.displaySpent.innerText = formatMoney(totalSpent);
            el.displayRemaining.innerText = formatMoney(remaining);
            el.countTx.innerText = `${state.expenses.length} GIAO DỊCH`;

            if (remaining < 0) {
                el.displayRemaining.classList.add('text-rose-300');
            } else {
                el.displayRemaining.classList.remove('text-rose-300');
            }
        }

        function renderExpenses() {
            el.expenseList.innerHTML = '';
            if (state.expenses.length === 0) {
                el.expenseList.innerHTML = `
                    <div class="text-center py-20 text-gray-300">
                        <i class="fa-solid fa-receipt text-5xl mb-4 opacity-20"></i>
                        <p class="text-sm italic tracking-wide text-gray-400 font-medium">Bạn chưa có giao dịch nào</p>
                    </div>
                `;
                return;
            }

            // Sắp xếp theo ngày mới nhất
            const sorted = [...state.expenses].sort((a, b) => new Date(b.date) - new Date(a.date));

            sorted.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'flex items-center justify-between group';
                div.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-indigo-50 rounded-2xl flex items-center justify-center text-indigo-500 shadow-sm border border-indigo-100">
                            <i class="fa-solid fa-tag"></i>
                        </div>
                        <div>
                            <p class="font-bold text-gray-800 text-sm">${item.category}</p>
                            <p class="text-[10px] text-gray-400 font-semibold uppercase tracking-tighter">${item.date} ${item.note ? '• ' + item.note : ''}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="font-extrabold text-rose-500 text-sm">-${formatMoney(item.amount)}</span>
                        <button onclick="deleteExpense(${item.id})" class="text-gray-300 hover:text-rose-500 transition-colors">
                            <i class="fa-solid fa-trash-can text-sm"></i>
                        </button>
                    </div>
                `;
                el.expenseList.appendChild(div);
            });
        }

        function renderCategories() {
            const grid = document.getElementById('category-grid');
            grid.innerHTML = '';
            state.categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `p-4 rounded-2xl text-xs font-bold border transition-all ${state.selectedCategory === cat ? 'bg-indigo-600 border-indigo-600 text-white shadow-lg' : 'bg-gray-50 border-gray-100 text-gray-600 hover:border-indigo-200'}`;
                btn.innerText = cat;
                btn.onclick = () => selectCategory(cat);
                grid.appendChild(btn);
            });
        }

        function selectCategory(cat) {
            state.selectedCategory = cat;
            document.getElementById('selected-category-text').innerText = cat;
            renderCategories();
            toggleModal('category-modal');
        }

        function addNewCategory() {
            const input = document.getElementById('input-new-cat');
            const newCat = input.value.trim();
            if (newCat && !state.categories.includes(newCat)) {
                state.categories.push(newCat);
                localStorage.setItem('categories', JSON.stringify(state.categories));
                input.value = '';
                selectCategory(newCat);
            }
        }

        function saveBudget() {
            const val = parseFloat(document.getElementById('input-budget').value);
            if (!isNaN(val)) {
                state.initialBudget = val;
                localStorage.setItem('initialBudget', state.initialBudget);
                renderDashboard();
                toggleModal('budget-modal');
            }
        }

        function openExpenseModal() {
            document.getElementById('input-amount').value = '';
            document.getElementById('input-note').value = '';
            document.getElementById('input-date').valueAsDate = new Date();
            toggleModal('expense-modal');
        }

        function saveExpense() {
            const amount = parseFloat(document.getElementById('input-amount').value);
            const date = document.getElementById('input-date').value;
            const note = document.getElementById('input-note').value;

            if (!amount || amount <= 0) return;

            const newExp = {
                id: Date.now(),
                amount,
                date,
                note,
                category: state.selectedCategory
            };

            state.expenses.unshift(newExp);
            localStorage.setItem('expenses', JSON.stringify(state.expenses));
            
            renderDashboard();
            renderExpenses();
            toggleModal('expense-modal');
        }

        function deleteExpense(id) {
            state.expenses = state.expenses.filter(item => item.id !== id);
            localStorage.setItem('expenses', JSON.stringify(state.expenses));
            renderDashboard();
            renderExpenses();
        }

        init();
    </script>
</body>
</html>
